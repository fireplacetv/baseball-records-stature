name: Update Baseball Data

# NOTE: This workflow requires the Lahman .bak file to be available as a
# GitHub Actions secret or artifact. Store the download URL (or a base64-encoded
# copy of the .bak file) in a repository secret named LAHMAN_BAK_URL, or adapt
# the "Get source file" step below to your preferred storage solution.
#
# For most users, rebuilding data locally and committing data/ is simpler.

on:
  push:
    branches: [main]
    paths:
      - 'processor/**'         # processor code or config changed
      - '.github/workflows/update-data.yml'
  schedule:
    - cron: '0 8 1 11 *'       # annually: November 1 (post-season Lahman update)
  workflow_dispatch:             # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: processor/requirements.txt

      - name: Install Python dependencies
        run: pip install -r processor/requirements.txt

      - name: Get source file
        # Adapt this step to wherever you store the .bak file.
        # Example: download from a private URL stored in a repository secret.
        run: |
          mkdir -p sources
          curl -L -o sources/lahman.bak "${{ secrets.LAHMAN_BAK_URL }}"

      - name: Build data files
        run: python processor/build.py --all

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update data from Lahman [skip ci]"
          git push
